# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check for known vulnerabilities in dependencies
db-path = "~/.cargo/advisory-db"
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"

[licenses]
# Allow common permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
unlicensed = "deny"

[bans]
# Warn on duplicate versions
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only allow crates.io by default
unknown-registry = "deny"
unknown-git = "warn"
