# Release workflow using cargo-dist
# Builds multi-platform binaries and creates a GitHub Release

name: Release

permissions:
  contents: write

on:
  push:
    tags: ["v[0-9]+.*"]

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hermes.exe dist/
          cd dist && 7z a hermes-${{ github.ref_name }}-${{ matrix.target }}.zip hermes.exe

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hermes dist/
          cd dist && tar czf hermes-${{ github.ref_name }}-${{ matrix.target }}.tar.gz hermes

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hermes-${{ github.ref_name }}-${{ matrix.target }}.*
