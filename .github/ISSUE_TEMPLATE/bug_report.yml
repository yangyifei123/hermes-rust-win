name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to trigger the bug
      placeholder: |
        1. Run `hermes chat --provider openai`
        2. Send message "..."
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error output)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hermes Version
      description: Output of `hermes --version`
      placeholder: "hermes v1.14.19"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Ubuntu / Debian
        - Other Linux
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Rust version, provider, model, config, or anything else relevant
